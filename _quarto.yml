project:
  type: website
  output-dir: docs
  resources:
    - doc/
    - cad/
    - img/

website:
  title: "docs"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: construction.qmd
        text: Construction
      - href: operation-maintenance.qmd
        text: Operation & Maintenance
      - href: results.qmd
        text: Results from Operation
    right:
      - icon: "envelope-at"
        href: "mailto:ghe@mavt.ethz.ch?subject=Glass Tumbler"
        aria-label: Email
      - icon: github
        href: https://github.com/Global-Health-Engineering/glass-tumbler
        aria-label: GitHub
      - icon: chat-left-dots
        href: https://matrix.to/#/#ghe-open:staffchat.ethz.ch
